# Traefik Static Configuration - Development Mode
# No SSL, HTTP only, dashboard enabled

api:
  dashboard: true
  insecure: true  # Dashboard accessible without authentication in dev

log:
  level: DEBUG

accessLog: {}

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: app-network
  file:
    filename: /etc/traefik/dynamic_conf.yml
    watch: true
