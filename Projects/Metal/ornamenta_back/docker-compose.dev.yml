services:
  traefik:
    image: traefik:v3.6.1
    container_name: traefik-dev
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    environment:
      # Force API version to avoid client/server version mismatch
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80" # HTTP
      - "8080:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.dev.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-backend-dev
    volumes:
      # Mount source code for hot reload
      - ./:/app
      # Exclude __pycache__ and other unnecessary directories
      - /app/__pycache__
      - /app/.pytest_cache
      # Keep firebase credentials
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    environment:
      - ENVIRONMENT=development
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - DATABASE_URL
      - FIREBASE_SERVICE_ACCOUNT_KEY_PATH
      - FIREBASE_PROJECT_ID
      - MANAGER_EMAIL
      - MANAGER_PASSWORD
      - MANAGER_FIREBASE_UID
      - FRONTEND_URL
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.backend.rule=Host(`localhost`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  db:
    image: postgres:17-alpine
    container_name: postgres-db-dev
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      # SQLAlchemy crea las tablas automaticamente, no necesitamos el script SQL
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432" # Exposed for local development (DataGrip, etc)
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: pgadmin-dev
    environment:
      - PGADMIN_DEFAULT_EMAIL
      - PGADMIN_DEFAULT_PASSWORD
      - PGADMIN_LISTEN_PORT=80
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    ports:
      - "5050:80" # pgAdmin web UI

volumes:
  postgres_data_dev:
  pgadmin_data_dev:

networks:
  app-network:
    driver: bridge
